name: Admin Font Size
version: 0.9.0
description: Adjusts the font size in the Grav Admin Panel (Admin Classic and Admin 2).
icon: text-height
author:
  name: Paul Hibbitts
  email: paul@hibbittsdesign.org
homepage: https://github.com/paulhibbitts/grav-plugin-admin-font-size
keywords: admin, font, size, accessibility
bugs: https://github.com/paulhibbitts/grav-plugin-admin-font-size/issues
license: MIT

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: Plugin Status
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    admin_font_size:
      type: select
      label: Admin Font Size
      help: 'Choose the font size scale for the Admin Panel body, form elements, toolbar, and Editor Pro.'
      default: large
      options:
        default: 'Default (no changes)'
        large: Large
        larger: Larger
