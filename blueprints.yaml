name: Admin Font Size
version: 0.9.0
description: Adjusts the font size in the Grav Admin Panel (Admin Classic and Admin 2).
icon: text-height
author:
  name: HibbittsDesign.org
  email: paul@hibbittsdesign.org
homepage: https://github.com/paulhibbitts/grav-plugin-admin-font-size
docs: https://github.com/paulhibbitts/grav-plugin-admin-font-size/blob/main/README.md
keywords: grav, admin, font, size, typography, readability
bugs: https://github.com/paulhibbitts/grav-plugin-admin-font-size/issues

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: Plugin Status
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    admin_font_size:
      type: select
      label: Admin Font Size
      help: 'Adjust the Admin Panel font size for improved readability.'
      default: larger
      options:
        default: 'Default (no changes)'
        larger: Larger
        largest: 'Much Larger'
